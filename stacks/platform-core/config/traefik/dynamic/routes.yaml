http:
  routers:
    platform-homepage:
      rule: Host(`home.localhost`)
      entryPoints: [web]
      service: platform-homepage
    platform-dockge:
      rule: Host(`dockge.localhost`)
      entryPoints: [web]
      service: platform-dockge
    platform-uptime-kuma:
      rule: Host(`uptime.localhost`)
      entryPoints: [web]
      service: platform-uptime-kuma
    platform-beszel:
      rule: Host(`beszel.localhost`)
      entryPoints: [web]
      service: platform-beszel
    traefik-dashboard:
      rule: Host(`traefik.localhost`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      entryPoints: [web]
      service: api@internal
    sloth-cloud-web:
      rule: Host(`cloud.localhost`)
      entryPoints: [web]
      service: sloth-cloud-web
    sloth-cloud-api:
      rule: Host(`cloud-api.localhost`)
      entryPoints: [web]
      service: sloth-cloud-api
    sloth-cloud-paymenter:
      rule: Host(`paymenter.localhost`)
      entryPoints: [web]
      service: sloth-cloud-paymenter
    sloth-convoy-web:
      rule: Host(`convoy.localhost`)
      entryPoints: [web]
      service: sloth-convoy-web
    sloth-xboard-web:
      rule: Host(`xboard.localhost`)
      entryPoints: [web]
      service: sloth-xboard-web
    cli-proxy-api:
      rule: Host(`cliproxy.localhost`)
      entryPoints: [web]
      service: cli-proxy-api
  services:
    platform-homepage:
      loadBalancer:
        servers:
          - url: http://platform-homepage:3000
    platform-dockge:
      loadBalancer:
        servers:
          - url: http://platform-dockge:5001
    platform-uptime-kuma:
      loadBalancer:
        servers:
          - url: http://platform-uptime-kuma:3001
    platform-beszel:
      loadBalancer:
        servers:
          - url: http://platform-beszel-hub:8090
    sloth-cloud-web:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:13000
    sloth-cloud-api:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:14000
    sloth-cloud-paymenter:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:18080
    sloth-convoy-web:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:18181
    sloth-xboard-web:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:7001
    cli-proxy-api:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8085
