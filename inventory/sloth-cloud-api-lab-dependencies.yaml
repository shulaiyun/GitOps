version: 1
service: sloth-cloud-api-lab
sources:
  deployment: k8s/apps/sloth-cloud-api/base/deployment.yaml
  active_overlay: k8s/apps/sloth-cloud-api/lab-dev-real-write
  configmap: k8s/apps/sloth-cloud-api/lab-dev-real-write/configmap.yaml
  secret_name: sloth-cloud-api-lab-secrets
  secret_mode: manual_kubernetes_secret
  secret_seed_script: scripts/seed_sloth_cloud_api_lab_secret_from_api_env.sh
  image_import_script: scripts/import_sloth_cloud_api_lab_image.sh
  legacy_external_secret: k8s/apps/sloth-cloud-api/lab/externalsecret.yaml
classes:
  A:
    id: lab_keep
    label: Lab can keep as-is
    chinese: "实验环境可以暂时保留"
  B:
    id: replace_before_sync
    label: Replace before first sync
    chinese: "第一次同步前必须替换"
  C:
    id: disable_or_isolate
    label: Disable or isolate before first sync
    chinese: "第一次同步前建议关闭或隔离"
  D:
    id: secret_only
    label: Secret only
    chinese: "必须走 Secret 或 ExternalSecret"
profiles:
  dev_real_write:
    label: "Dev real-write lab"
    chinese: "开发环境真实写入实验"
    intent: "Connect the lab API to real development business systems and allow destructive business side effects while protecting the project itself."
    accepted_side_effects:
      - "payment"
      - "refund"
      - "service_provision"
      - "service_delete"
      - "vps_reinstall"
      - "vps_power_action"
      - "dns_change"
      - "webhook_send"
      - "deployment_run"
      - "development_database_write"
    protected_assets:
      - "source_code"
      - "git_history"
      - "compose_definitions"
      - "kubernetes_manifests"
      - "production_route_cutover"
      - "non_dev_remote_services"
    required_gates:
      - "No placeholder image or replace-me value remains."
      - "ExternalSecret uses a real ClusterSecretStore."
      - "All connected systems are confirmed as development-owned or explicitly accepted by the operator."
      - "The lab API must not mount or mutate the project source tree."
      - "The lab API must not push Git commits, rewrite Git history, or edit Compose/Kubernetes control files."
      - "Traffic remains on lab routes until an explicit cutover decision exists."
operation_policy:
  current_profile: dev_real_write
  destructive_dev_business_operations_are_accepted: true
  project_code_mutation_is_accepted: false
  notes:
    - "The lab may mutate development business data because this environment is operator-owned."
    - "The lab must not mutate the project repository, source code, Compose files, Kubernetes manifests, or Git history."
    - "Production-like data changes are acceptable only when the target system is actually this development environment."
config:
  PORT:
    class: A
    reason: "API listens on container port 4000 in both Compose and lab."
    action: "Keep for the lab."
  PLATFORM_ENV:
    class: A
    reason: "Marks the runtime as lab."
    action: "Keep as lab."
  SESSION_COOKIE_SECURE:
    class: A
    reason: "Local lab traffic is not fully HTTPS end to end."
    action: "Keep false for local lab; revisit for production."
  RUNTIME_READ_CACHE_TTL_MS:
    class: A
    reason: "Short runtime-state cache TTL is safe for lab validation."
    action: "Keep."
  PAYMENTER_MODE:
    class: C
    reason: "Current value is live and may call the real billing/customer system."
    action: "Allowed in dev_real_write if the target Paymenter is development-owned; otherwise replace with a dev endpoint."
  PAYMENTER_API_URL:
    class: B
    reason: "The active dev_real_write overlay points to the local development Paymenter exposed through host.docker.internal."
    action: "Keep as a development-owned Paymenter endpoint; do not replace it with the remote production Paymenter."
  PAYMENTER_TIMEOUT_MS:
    class: A
    reason: "Timeout value is ordinary Paymenter client tuning."
    action: "Keep."
  CONVOY_ENABLED:
    class: C
    reason: "Current value enables real server-control integration."
    action: "Allowed in dev_real_write if the target Convoy controls development-owned VPS resources."
  CONVOY_MODE:
    class: C
    reason: "Current value is live."
    action: "Allowed in dev_real_write after the Convoy endpoint is confirmed as development-owned."
  CONVOY_BASE_URL:
    class: B
    reason: "The active dev_real_write overlay points to the local development Convoy exposed through host.docker.internal."
    action: "Keep as a development-owned Convoy endpoint."
  CONVOY_TIMEOUT_MS:
    class: A
    reason: "Timeout value is not environment-specific."
    action: "Keep."
  CONVOY_APPLICATION_PREFIX:
    class: A
    reason: "Application API path prefix is ordinary routing config."
    action: "Keep unless Convoy API shape changes."
  CONVOY_SERVER_REF_KEYS:
    class: A
    reason: "Server reference key list is ordinary mapping config."
    action: "Keep."
  MANAGED_APP_ENABLED:
    class: C
    reason: "Current value enables managed app build/deploy behavior inside the lab cluster."
    action: "Allowed in dev_real_write after the registry, namespace, RBAC, and quotas are ready."
  MANAGED_APP_DRIVER:
    class: C
    reason: "in-cluster means the API can create Kubernetes build/deploy resources."
    action: "Allowed in dev_real_write after RBAC, namespace, and registry are ready."
  MANAGED_APP_DEFAULT_CLUSTER_REF:
    class: A
    reason: "Cluster reference name is harmless when managed apps are disabled."
    action: "Keep for now."
  MANAGED_APP_NAMESPACE_PREFIX:
    class: A
    reason: "Namespace naming prefix is harmless when managed apps are disabled."
    action: "Keep for now."
  MANAGED_APP_BUILD_NAMESPACE:
    class: C
    reason: "Build namespace must exist and have clear quota/RBAC before builds are enabled."
    action: "Create and govern it before enabling managed app builds."
  MANAGED_APP_BUILDKIT_IMAGE:
    class: A
    reason: "BuildKit image reference is normal build configuration."
    action: "Keep after build path is intentionally enabled."
  MANAGED_APP_BUILDKIT_SNAPSHOTTER:
    class: A
    reason: "BuildKit snapshotter is normal build configuration."
    action: "Keep."
  MANAGED_APP_BUILD_EPHEMERAL_REQUEST:
    class: A
    reason: "Resource request is ordinary build tuning."
    action: "Keep after build path is intentionally enabled."
  MANAGED_APP_FALLBACK_NODE_IMAGE:
    class: A
    reason: "Fallback Node image is ordinary build configuration."
    action: "Keep if the mirror remains reachable."
  MANAGED_APP_FALLBACK_NPM_REGISTRY:
    class: A
    reason: "Fallback npm registry is ordinary build configuration."
    action: "Keep if the mirror remains acceptable for lab."
  MANAGED_APP_REWRITE_NODE_BASE_IMAGE:
    class: A
    reason: "Dockerfile rewrite flag is ordinary build behavior."
    action: "Keep after build path is intentionally enabled."
  MANAGED_APP_PREFER_GENERATED_NODE_DOCKERFILE:
    class: A
    reason: "Generated Dockerfile preference is ordinary build behavior."
    action: "Keep after build path is intentionally enabled."
  MANAGED_APP_IMAGE_REGISTRY:
    class: B
    reason: "The active dev_real_write overlay points to the current development lab registry."
    action: "Keep only while this registry is development-owned and reachable from the lab cluster."
  MANAGED_APP_IMAGE_REGISTRY_INSECURE:
    class: C
    reason: "Insecure registry access should be deliberate and isolated."
    action: "Keep true only for a local lab registry; otherwise set false."
  MANAGED_APP_IMAGE_REPOSITORY_PREFIX:
    class: A
    reason: "Repository prefix is ordinary image naming config."
    action: "Keep unless registry naming changes."
  MANAGED_APP_INGRESS_CLASS:
    class: A
    reason: "Traefik is the current lab ingress/gateway implementation."
    action: "Keep for lab."
  MANAGED_APP_DEFAULT_DOMAIN_SUFFIX:
    class: B
    reason: "The active dev_real_write overlay uses the current development domain suffix."
    action: "Keep only for development previews."
  MANAGED_APP_STORAGE_CLASS:
    class: A
    reason: "local-path is normal for a local K3s/k3d lab."
    action: "Keep for Mac lab; revisit for production."
  MANAGED_APP_BUILD_CPU_REQUEST:
    class: A
    reason: "Resource request is ordinary build tuning."
    action: "Keep after build path is intentionally enabled."
  MANAGED_APP_BUILD_MEMORY_REQUEST:
    class: A
    reason: "Resource request is ordinary build tuning."
    action: "Keep after build path is intentionally enabled."
  ASSISTANT_ENABLED:
    class: C
    reason: "Assistant enabled requires provider API keys and quota cookie secret."
    action: "Allowed in dev_real_write after provider keys and quota cookie secret are present."
  ASSISTANT_PRIMARY_PROVIDER:
    class: A
    reason: "Provider preference is ordinary non-secret config."
    action: "Keep if assistant remains enabled."
  ASSISTANT_PROVIDER_CHAIN:
    class: A
    reason: "Provider fallback order is ordinary non-secret config."
    action: "Keep if assistant remains enabled."
  ASSISTANT_OPENAI_MODEL:
    class: A
    reason: "Model selection is ordinary non-secret assistant config."
    action: "Keep aligned with the local development API env."
  ASSISTANT_OPENAI_BASE_URL:
    class: C
    reason: "Points assistant traffic at the local development provider proxy."
    action: "Allowed in dev_real_write if the provider proxy is intentionally running on this Mac."
  ASSISTANT_GEMINI_MODEL:
    class: A
    reason: "Model selection is ordinary non-secret assistant config."
    action: "Keep aligned with the local development API env."
  ASSISTANT_GEMINI_BASE_URL:
    class: C
    reason: "Points assistant traffic at the local development provider proxy."
    action: "Allowed in dev_real_write if the provider proxy is intentionally running on this Mac."
  ASSISTANT_CLAUDE_MODEL:
    class: A
    reason: "Model selection is ordinary non-secret assistant config."
    action: "Keep aligned with the local development API env."
  ASSISTANT_CLAUDE_BASE_URL:
    class: C
    reason: "Points assistant traffic at the local development provider proxy."
    action: "Allowed in dev_real_write if the provider proxy is intentionally running on this Mac."
  ASSISTANT_CONFIRM_TTL_SECONDS:
    class: A
    reason: "TTL config is safe."
    action: "Keep."
  ASSISTANT_SESSION_TTL_SECONDS:
    class: A
    reason: "TTL config is safe."
    action: "Keep."
  ASSISTANT_MAX_CONTEXT_MESSAGES:
    class: A
    reason: "Context limit is safe."
    action: "Keep."
  ASSISTANT_SUPPORT_WEB_URL:
    class: A
    reason: "Relative support URL is safe."
    action: "Keep."
  ASSISTANT_GUEST_DAILY_POINTS:
    class: A
    reason: "Quota config is safe."
    action: "Keep."
  ASSISTANT_FREE_DAILY_POINTS:
    class: A
    reason: "Quota config is safe."
    action: "Keep."
  ASSISTANT_PAID_DAILY_POINTS:
    class: A
    reason: "Quota config is safe."
    action: "Keep."
  ASSISTANT_GUEST_BURST_PER_MINUTE:
    class: A
    reason: "Rate-limit config is safe."
    action: "Keep."
  ASSISTANT_USER_BURST_PER_MINUTE:
    class: A
    reason: "Rate-limit config is safe."
    action: "Keep."
  ASSISTANT_UNLIMITED_PRODUCT_SLUG:
    class: A
    reason: "Product slug is non-secret config."
    action: "Keep if Paymenter mapping is ready."
  ASSISTANT_QUOTA_TIMEZONE:
    class: A
    reason: "Quota timezone is safe."
    action: "Keep."
  OPERATOR_PREVIEW_BASE_URL:
    class: B
    reason: "The active dev_real_write overlay publishes preview links through the lab API route."
    action: "Keep while the route remains lab-only."
  OPERATOR_ARTIFACT_BASE_URL:
    class: B
    reason: "The active dev_real_write overlay publishes artifact links through the lab API route."
    action: "Keep while the route remains lab-only."
  OPERATOR_WEB_BASE_URL:
    class: B
    reason: "The active dev_real_write overlay points user-facing web links at the local development web container."
    action: "Keep as a browser-facing development URL."
  OPERATOR_CLOUDFLARE_ZONE_NAME:
    class: B
    reason: "The active dev_real_write overlay uses the current development zone name."
    action: "Keep only when Cloudflare actions are intended for the development zone."
  OPERATOR_CLOUDFLARE_TUNNEL_SERVICE:
    class: B
    reason: "The active dev_real_write overlay points tunnel traffic at the local development web container."
    action: "Keep only for development tunnel tests."
  OPERATOR_MONITORING_WEBHOOK_BASE_URL:
    class: B
    reason: "The active dev_real_write overlay points monitoring webhooks at the lab API route."
    action: "Keep while monitoring webhook tests remain lab-only."
secrets:
  CONVOY_APPLICATION_KEY:
    class: D
    reason: "Convoy application key is sensitive."
    action: "Provide through ExternalSecret after choosing the lab Convoy endpoint."
  MANAGED_APP_INTERNAL_API_TOKEN:
    class: D
    reason: "Internal managed-app token is sensitive."
    action: "Provide through ExternalSecret before enabling managed app operations."
  ASSISTANT_OPENAI_API_KEY:
    class: D
    reason: "OpenAI API key is sensitive."
    action: "Provide through ExternalSecret if assistant is enabled."
  ASSISTANT_GEMINI_API_KEY:
    class: D
    reason: "Gemini API key is sensitive."
    action: "Provide through ExternalSecret if provider chain includes Gemini."
  ASSISTANT_CLAUDE_API_KEY:
    class: D
    reason: "Claude API key is sensitive."
    action: "Provide through ExternalSecret if provider chain includes Claude."
  ASSISTANT_QUOTA_COOKIE_SECRET:
    class: D
    reason: "Quota cookie signing secret is sensitive."
    action: "Provide through ExternalSecret if assistant quotas are enabled."
  OPERATOR_CLOUDFLARE_API_TOKEN:
    class: D
    reason: "Cloudflare token is sensitive and can change external DNS/tunnel state."
    action: "Provide only for a lab-scoped token, or keep Cloudflare operator paths disabled."
  OPERATOR_MONITORING_WEBHOOK_SECRET:
    class: D
    reason: "Monitoring webhook secret is sensitive."
    action: "Provide through ExternalSecret if monitoring webhook path is enabled."
first_sync_gates:
  - "No ConfigMap value may contain replace-me."
  - "The local image sloth-cloud-api-lab:dev must be imported into the k3d cluster."
  - "The manual Kubernetes Secret sloth-cloud-api-lab-secrets must contain every key listed under secrets."
  - "Live integrations may write development business data, but connected targets must be development-owned or explicitly accepted."
  - "Managed app in-cluster build/deploy may be enabled only after registry, namespace, RBAC, and quota are ready."
  - "Assistant may be enabled only after provider keys and quota cookie secret are available."
  - "The lab API must not mutate source code, Git history, Compose definitions, or Kubernetes control files."
last_live_verification:
  date: "2026-04-25"
  git_revision: "f36d3847e57d49136da5033a514431153741667b"
