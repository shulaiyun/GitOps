- Unified Entry:
    - Sloth Ops Portal:
        href: https://ops.shulaiyun.top
        description: 统一首页。对外只记这个地址，进来后再跳到各个面板和业务入口。
    - Public Access Gate:
        href: https://ops.shulaiyun.top
        description: 已加 Basic Auth 统一门禁；Basic Auth 就是浏览器弹出的用户名密码保护。
- Operations Panels:
    - Argo CD:
        href: https://argo-ops.shulaiyun.top
        description: Kubernetes GitOps 管理面板；GitOps 是用 Git 仓库驱动部署。
    - Uptime Kuma:
        href: https://uptime-ops.shulaiyun.top
        description: 公网和局域网可用性监控；Monitor 是一个健康检查目标。
    - Beszel:
        href: https://beszel-ops.shulaiyun.top
        description: 主机与容器资源监控；用于看 CPU、内存、磁盘和容器状态。
    - Dockge:
        href: https://dockge-ops.shulaiyun.top
        description: Docker Compose 栈管理面板；Compose 是一组容器的编排文件。
    - Traefik Dashboard:
        href: https://traefik-ops.shulaiyun.top/dashboard/
        description: 公网入口路由状态；Traefik 是负责按域名分流请求的反向代理。
