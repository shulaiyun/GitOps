apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sloth-cloud-web
  labels:
    app.kubernetes.io/name: sloth-cloud-web
    app.kubernetes.io/part-of: sloth-cloud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sloth-cloud-web
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 20
