apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sloth-cloud-api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: replace-me-secret-store
  target:
    name: sloth-cloud-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: CONVOY_APPLICATION_KEY
      remoteRef:
        key: sloth-cloud/lab/api
        property: CONVOY_APPLICATION_KEY
    - secretKey: MANAGED_APP_INTERNAL_API_TOKEN
      remoteRef:
        key: sloth-cloud/lab/api
        property: MANAGED_APP_INTERNAL_API_TOKEN
    - secretKey: ASSISTANT_OPENAI_API_KEY
      remoteRef:
        key: sloth-cloud/lab/api
        property: ASSISTANT_OPENAI_API_KEY
    - secretKey: ASSISTANT_GEMINI_API_KEY
      remoteRef:
        key: sloth-cloud/lab/api
        property: ASSISTANT_GEMINI_API_KEY
    - secretKey: ASSISTANT_CLAUDE_API_KEY
      remoteRef:
        key: sloth-cloud/lab/api
        property: ASSISTANT_CLAUDE_API_KEY
    - secretKey: ASSISTANT_QUOTA_COOKIE_SECRET
      remoteRef:
        key: sloth-cloud/lab/api
        property: ASSISTANT_QUOTA_COOKIE_SECRET
    - secretKey: OPERATOR_CLOUDFLARE_API_TOKEN
      remoteRef:
        key: sloth-cloud/lab/api
        property: OPERATOR_CLOUDFLARE_API_TOKEN
    - secretKey: OPERATOR_MONITORING_WEBHOOK_SECRET
      remoteRef:
        key: sloth-cloud/lab/api
        property: OPERATOR_MONITORING_WEBHOOK_SECRET
