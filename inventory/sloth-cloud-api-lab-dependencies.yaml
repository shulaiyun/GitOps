  argo_health_status: "Healthy"
  deployment_ready: "1/1"
  pod_status: "Running"
  route: "http://sloth-cloud-api.lab.localhost:16080/api/v1/health"
  health_result: "ok=true sourceMode=live"
  compose_cutover: "not performed"
