apiVersion: apps/v1
kind: Deployment
metadata:
  name: sloth-cloud-api-lab
  labels:
    app.kubernetes.io/name: sloth-cloud-api-lab
    app.kubernetes.io/part-of: sloth-cloud-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sloth-cloud-api-lab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sloth-cloud-api-lab
        app.kubernetes.io/part-of: sloth-cloud-lab
    spec:
      containers:
        - name: api
          image: ghcr.io/replace-me/sloth-cloud-api-lab:0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
            - name: PLATFORM_ENV
              value: "lab"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
