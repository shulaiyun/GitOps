apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sloth-cloud-web
  labels:
    app.kubernetes.io/name: sloth-cloud-web
    app.kubernetes.io/part-of: sloth-cloud-lab
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - cloud.lab.localhost
  rules:
    - backendRefs:
        - name: sloth-cloud-web
          port: 80
