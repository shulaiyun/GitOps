apiVersion: v1
kind: ConfigMap
metadata:
  name: sloth-cloud-api-lab-config
data:
  PORT: "4000"
  PLATFORM_ENV: "lab"
  PAYMENTER_MODE: "live"
  PAYMENTER_API_URL: "http://host.docker.internal:18080/api"
  PAYMENTER_TIMEOUT_MS: "8000"
  SESSION_COOKIE_SECURE: "false"
  RUNTIME_READ_CACHE_TTL_MS: "1000"
  CONVOY_ENABLED: "true"
  CONVOY_MODE: "live"
  CONVOY_BASE_URL: "http://host.docker.internal:18181"
  CONVOY_TIMEOUT_MS: "30000"
  CONVOY_APPLICATION_PREFIX: "/api/application"
  CONVOY_SERVER_REF_KEYS: "convoy_server_uuid,convoy_server_id,convoy_server_short_id,server_uuid"
  MANAGED_APP_ENABLED: "true"
  MANAGED_APP_DRIVER: "in-cluster"
  MANAGED_APP_DEFAULT_CLUSTER_REF: "default"
  MANAGED_APP_NAMESPACE_PREFIX: "app"
  MANAGED_APP_BUILD_NAMESPACE: "managed-app-build"
  MANAGED_APP_BUILDKIT_IMAGE: "moby/buildkit:rootless"
  MANAGED_APP_BUILDKIT_SNAPSHOTTER: "native"
  MANAGED_APP_BUILD_EPHEMERAL_REQUEST: "1Gi"
  MANAGED_APP_FALLBACK_NODE_IMAGE: "docker.m.daocloud.io/library/node:22-alpine"
  MANAGED_APP_FALLBACK_NPM_REGISTRY: "https://registry.npmmirror.com"
  MANAGED_APP_REWRITE_NODE_BASE_IMAGE: "true"
  MANAGED_APP_PREFER_GENERATED_NODE_DOCKERFILE: "true"
  MANAGED_APP_IMAGE_REGISTRY: "192.168.16.220:30500"
  MANAGED_APP_IMAGE_REGISTRY_INSECURE: "true"
  MANAGED_APP_IMAGE_REPOSITORY_PREFIX: "sloth-managed-apps"
  MANAGED_APP_INGRESS_CLASS: "traefik"
  MANAGED_APP_DEFAULT_DOMAIN_SUFFIX: "shulaiyun.top"
  MANAGED_APP_STORAGE_CLASS: "local-path"
  MANAGED_APP_BUILD_CPU_REQUEST: "250m"
  MANAGED_APP_BUILD_MEMORY_REQUEST: "512Mi"
  ASSISTANT_ENABLED: "true"
  ASSISTANT_PRIMARY_PROVIDER: "openai"
  ASSISTANT_PROVIDER_CHAIN: "openai,gemini,claude"
  ASSISTANT_OPENAI_MODEL: "gpt-5.4"
  ASSISTANT_OPENAI_BASE_URL: "http://host.docker.internal:8317/v1"
  ASSISTANT_GEMINI_MODEL: "gemini-3.1-pro-high"
  ASSISTANT_GEMINI_BASE_URL: "http://host.docker.internal:8317/v1"
  ASSISTANT_CLAUDE_MODEL: "claude-sonnet-4-6"
  ASSISTANT_CLAUDE_BASE_URL: "http://host.docker.internal:8317/v1"
  ASSISTANT_CONFIRM_TTL_SECONDS: "600"
  ASSISTANT_SESSION_TTL_SECONDS: "86400"
  ASSISTANT_MAX_CONTEXT_MESSAGES: "30"
  ASSISTANT_SUPPORT_WEB_URL: "/tickets"
  ASSISTANT_GUEST_DAILY_POINTS: "200000"
  ASSISTANT_FREE_DAILY_POINTS: "2000000"
  ASSISTANT_PAID_DAILY_POINTS: "20000000"
  ASSISTANT_GUEST_BURST_PER_MINUTE: "10"
  ASSISTANT_USER_BURST_PER_MINUTE: "40"
  ASSISTANT_UNLIMITED_PRODUCT_SLUG: "assistant-unlimited-monthly"
  ASSISTANT_QUOTA_TIMEZONE: "America/Los_Angeles"
  OPERATOR_PREVIEW_BASE_URL: "http://sloth-cloud-api.lab.localhost:16080"
  OPERATOR_ARTIFACT_BASE_URL: "http://sloth-cloud-api.lab.localhost:16080"
  OPERATOR_WEB_BASE_URL: "http://localhost:13000"
  OPERATOR_CLOUDFLARE_ZONE_NAME: "shulaiyun.top"
  OPERATOR_CLOUDFLARE_TUNNEL_SERVICE: "http://host.docker.internal:13000"
  OPERATOR_MONITORING_WEBHOOK_BASE_URL: "http://sloth-cloud-api.lab.localhost:16080"
